apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: 8296350150/my-docker-repo:latest  # Replace with your actual Docker Hub image
          ports:
            - containerPort: 80
